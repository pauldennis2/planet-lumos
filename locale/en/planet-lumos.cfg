chem-plant-mini1=A miniaturized 2×2 Chemical Plant. Placeable anywhere a Chemical Plant can go.
bob-am6-mini1=A miniaturized 2×2 Bob's Assembling Machine 6. Placeable anywhere a Bob's AM6 can go.
bob-chem4-mini1=A miniaturized 2×2 Bob's Chemical Plant 4. Placeable anywhere a Bob's Chemical Plant 4 can go.
miniaturization-testing-facility=Places a Miniaturization Testing Facility.
miniaturization-research-facility=Places a Miniaturization Research Facility.
shadow-generator=Generates power on Lumos. Only operates in darkness — shuts off near active lights.
foundry-miniaturization-data=Structural analysis data from a deconstructed Foundry. Used to research Foundry miniaturization.
