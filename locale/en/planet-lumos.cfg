[entity-description]
lumite=A glowing mineral unique to Lumos, essential for miniaturization.
light-vent=A crack in the Lumos surface venting liquid light from below. Place a pumpjack to extract it.
big-lamp=A heavy-duty 5×5 lamp that illuminates a 15-tile radius. Essential on Lumos, where no natural light reaches the surface.
big-lamp-mini1=A miniaturized 3×3 Big Lamp. Same light radius, 50% higher power draw.
big-lamp-mini2=A fully miniaturized 1×1 Big Lamp. Same light radius, double the power draw.
miniaturization-testing-facility-mini1=A miniaturized 8×8 Miniaturization Testing Facility. Slightly reduced crafting speed.
miniaturization-testing-facility-mini2=A heavily miniaturized 4×4 Miniaturization Testing Facility. Further reduced crafting speed.
foundry-mini1=A miniaturized 4×4 Foundry. Same power draw and module slots as a standard Foundry, with crafting speed scaled to its smaller footprint.
foundry-mini2=A heavily miniaturized 3×3 Foundry. Same power draw and module slots as a standard Foundry, with crafting speed scaled to its smaller footprint.
assembler-mini1=A miniaturized 2×2 Assembling Machine 3. Same power draw and module slots, crafting speed scaled to footprint.
em-plant-mini1=A miniaturized 3×3 Electromagnetic Plant. Same power draw and module slots, crafting speed scaled to footprint.
chem-plant-mini1=A miniaturized 2×2 Chemical Plant. Same power draw and module slots, crafting speed scaled to footprint.
bob-am6-mini1=A miniaturized 2×2 Bob's Assembling Machine 6. Same power draw and module slots, crafting speed scaled to footprint.
bob-chem4-mini1=A miniaturized 2×2 Bob's Chemical Plant 4. Same power draw and module slots, crafting speed scaled to footprint.
miniaturization-testing-facility=A 12×12 research facility for developing miniaturization techniques. Insert a building to produce structural analysis data. Accepts all module types.
miniaturization-research-facility=A specialized laboratory that consumes miniaturization data to research new miniaturization technologies.
shadow-generator=A Lumos-native power source that harnesses the planet's perpetual darkness. Shuts off when within range of an active light source.

