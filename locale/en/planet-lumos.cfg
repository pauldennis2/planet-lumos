[technology-description]
planet-discovery-lumos=Discover the planet Lumos, a mysterious world built for miniaturization.
lumoplating=Smelt lumite into lumoplate in a Foundry. Unlocks the Big Lamp, the Miniaturization Testing Facility, and the Research Facility.
miniaturization-1=Begin harnessing the principles of miniaturization.
miniaturization-2=Advanced miniaturization techniques enabling more extreme size reductions.
foundry-miniaturization-1=Construct a miniaturized 4×4 Foundry using Lumos technology.
foundry-miniaturization-2=Construct a heavily miniaturized 3×3 Foundry using Lumos technology.
em-plant-miniaturization-1=Construct a miniaturized 3×3 Electromagnetic Plant using Lumos technology.
assembler-miniaturization-1=Construct a miniaturized 2×2 Assembling Machine 3 using Lumos technology.
chem-plant-miniaturization-1=Construct a miniaturized 2×2 Chemical Plant using Lumos technology.
bob-am6-miniaturization-1=Construct a miniaturized 2×2 Bob's Assembling Machine 6 using Lumos technology.
bob-chem4-miniaturization-1=Construct a miniaturized 2×2 Bob's Chemical Plant 4 using Lumos technology.
big-lamp-miniaturization-1=Miniaturize the Big Lamp to a 3×3 footprint. Light radius unchanged; power draw increases 50%.
big-lamp-miniaturization-2=Further miniaturize the Big Lamp to 1×1. Light radius unchanged; power draw doubles versus the base.
mtf-miniaturization-1=Miniaturize the Miniaturization Testing Facility to an 8×8 footprint at slightly reduced crafting speed.
mtf-miniaturization-2=Further miniaturize the MTF to a 4×4 footprint at further reduced crafting speed.
